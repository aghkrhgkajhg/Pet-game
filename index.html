<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pet Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="game">

    <h1>My Pet</h1>

    <div class="pet-box">
      <img id="pet" src="https://i.imgur.com/3XQ9Z1n.png" />
    </div>

    <div class="stats">
      <p>Level: <span id="level">1</span></p>
      <p>XP: <span id="xp">0</span></p>
      <p>Happiness: <span id="happiness">100</span>%</p>
    </div>

    <div class="bars">
      <div class="bar">
        <div id="xpBar"></div>
      </div>
    </div>

    <div class="buttons">
      <button onclick="feedPet()">Feed</button>
      <button onclick="playPet()">Play</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
